services:
  redis:
    image: redis:7.2-alpine
    container_name: examecho-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - redis_data:/data

  examecho-ai:
    build: .
    container_name: examecho-ai
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_MODEL_QUESTION: "gpt-5.4-nano"
      OPENAI_MODEL_RUBRIC: "gpt-5.4-nano"
      OPENAI_MODEL_EVAL: "gpt-5.4-mini"
      OPENAI_MODEL_MCQ: "gpt-5.4-nano"
      OPENAI_TEMPERATURE: "0.0"
      OPENAI_MAX_RETRIES: "1"
      OPENAI_GENERATION_CHUNK_SIZE: "10"
      OPENAI_TOPIC_BATCH_SIZE: "4"
      LLM_CACHE_ENABLED: "true"
      LLM_CACHE_BACKEND: "redis"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_CACHE_PREFIX: "examecho:llm:"
      REDIS_CONNECT_RETRIES: "3"
      REDIS_CONNECT_BACKOFF_SECONDS: "0.5"
      REDIS_CONNECT_TIMEOUT_SECONDS: "2.0"
      TTS_AUDIO_DIR: "/app/generated_audio"
      CORS_ORIGINS: '["*"]'
    restart: unless-stopped
    volumes:
      - ./generated_audio:/app/generated_audio
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
