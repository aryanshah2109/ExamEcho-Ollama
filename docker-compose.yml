services:
  ollama:
    image: ollama/ollama:latest
    container_name: examecho-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  examecho-ai:
    build: .
    container_name: examecho-ai
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL_NAME: "mistral:7b-instruct-q4_K_M"
      OLLAMA_TEMPERATURE: "0.0"
      OLLAMA_MAX_TOKENS: "2048"
      WHISPER_MODEL_SIZE: "base"
      TTS_AUDIO_DIR: "/app/generated_audio"
      CORS_ORIGINS: '["*"]'
    depends_on:
      ollama:
        condition: service_healthy   
    restart: unless-stopped
    volumes:
      - ./generated_audio:/app/generated_audio

volumes:
  ollama_data: